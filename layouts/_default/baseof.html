<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Site.Title }}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #272822;
      color: #f8f8f2;
      font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.7;
    }
    .wrapper {
      display: flex;
      min-height: 100vh;
      max-width: 1100px;
      margin: 0 auto;
      padding: 10vh 5% 2rem;
    }
    nav {
      position: sticky;
      top: 2rem;
      align-self: flex-start;
      margin-right: 3rem;
      margin-top: 3.9rem;
      flex-shrink: 0;
    }
    nav a { display: block; margin-bottom: 0.75rem; color: #e6db74; }
    .content { flex: 1; }
    h1 { color: #f8f8f2; margin-bottom: 1.5rem; font-size: 1.4rem; font-weight: 700; }
    h2 { color: #a6e22e; margin-top: 1.5rem; margin-bottom: 0.5rem; font-size: 1.2rem; }
    p { margin-bottom: 1rem; }
    ul, ol { margin-bottom: 1rem; list-style-position: inside; }
    li { margin-bottom: 0.4rem; }
    a { color: #66d9ef; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .comment { color: #75715e; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #49483e; color: #75715e; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
    footer .icons { display: flex; gap: 0.75rem; }
    footer .icons a { color: #75715e; }
    footer .icons a:hover { color: #f8f8f2; }
    footer .icons svg { width: 18px; height: 18px; fill: currentColor; }
    @media (max-width: 600px) {
      .wrapper { flex-direction: column; padding-top: 2rem; }
      nav { position: static; margin-right: 0; margin-top: 0; margin-bottom: 1.5rem; }
      nav a { display: inline; margin-right: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <nav>
      <a href="/">about</a>
    </nav>
    <div class="content">
      <main>
        {{ block "main" . }}{{ end }}
      </main>
      <footer>
        <span class="comment">// {{ .Site.Title }} &copy; {{ now.Year }}</span>
        <div class="icons">
          <a href="https://github.com/pausic" target="_blank" rel="noopener" aria-label="GitHub">
            {{ readFile "assets/icons/github.svg" | safeHTML }}
          </a>
          <a href="https://linkedin.com/in/pausc" target="_blank" rel="noopener" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          </a>
        </div>
      </footer>
    </div>
  </div>
</body>
</html>
